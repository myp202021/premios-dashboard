<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard BI — Premios Increíbles</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:#0A0A0F;color:#fff;line-height:1.5;font-size:13px}
.c{max-width:1200px;margin:0 auto;padding:0 24px}
.hd{padding:20px 0;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.hd h1{font-size:22px;font-weight:900}.hd .logo{height:44px;border-radius:50%}
.hd p{font-size:11px;color:rgba(255,255,255,0.4)}
.period{display:inline-block;padding:3px 10px;border-radius:5px;background:rgba(229,57,53,0.15);border:1px solid rgba(229,57,53,0.3);font-size:10px;font-weight:700;color:#E53935;margin-top:4px}
.kg{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:16px 0}
.k{background:#141418;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px;text-align:center;position:relative;overflow:hidden}
.k::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#E53935,#FFD700)}
.kv{font-size:20px;font-weight:900;margin-bottom:2px;color:#FFD700}
.kl{font-size:8px;color:rgba(255,255,255,0.4);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.k .spark{margin-top:6px}
.s{padding:20px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.st{font-size:14px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.st::before{content:'';width:3px;height:14px;background:linear-gradient(135deg,#E53935,#FFD700);border-radius:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.cd{background:#141418;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px}
.cd h3{font-size:12px;font-weight:800;margin-bottom:8px;color:#FFD700}
table{width:100%;border-collapse:separate;border-spacing:0;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);font-size:11px;margin-bottom:10px}
thead th{background:#1C1C24;color:rgba(255,255,255,0.5);padding:8px 10px;text-align:left;font-weight:700;font-size:9px;text-transform:uppercase}
thead th.r{text-align:right}
tbody td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.03);color:rgba(255,255,255,0.7)}
tbody td.r{text-align:right;font-variant-numeric:tabular-nums}
tbody td.b{font-weight:700;color:#fff}
tbody tr:hover td{background:rgba(229,57,53,0.04)}
tbody tr.row-green td{background:rgba(16,185,129,0.07)}
tbody tr.row-red td{background:rgba(229,57,53,0.07)}
tbody tr:nth-child(even) td{background:rgba(255,255,255,0.015)}
.insight{background:rgba(255,215,0,0.05);border:1px solid rgba(255,215,0,0.12);border-radius:10px;padding:12px;margin-top:10px}
.insight h4{font-size:11px;font-weight:800;color:#FFD700;margin-bottom:4px}
.insight p{font-size:10px;color:rgba(255,255,255,0.45);line-height:1.7}
.alert{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:12px;margin-top:10px}
.alert h4{font-size:11px;font-weight:800;color:#EF4444;margin-bottom:4px}
.alert p{font-size:10px;color:rgba(255,255,255,0.45);line-height:1.7}
.opp{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:10px;padding:12px;margin-top:10px}
.opp h4{font-size:11px;font-weight:800;color:#10B981;margin-bottom:4px}
.opp p{font-size:10px;color:rgba(255,255,255,0.45);line-height:1.7}
.up{color:#10B981}.dn{color:#EF4444}.nt{color:#F59E0B}.gd{color:#FFD700}
.foot{padding:14px 0;text-align:center;font-size:9px;color:rgba(255,255,255,0.15)}
.bar{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.bar-fill{height:20px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:9px;font-weight:700;min-width:24px}
.bar-label{font-size:10px;color:rgba(255,255,255,0.4);min-width:80px}
.stacked-bar{display:flex;height:24px;border-radius:6px;overflow:hidden;margin-top:6px;margin-bottom:4px}
.stacked-seg{display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;min-width:20px;color:#fff}
.fallback{text-align:center;padding:30px;color:rgba(255,255,255,0.25);font-size:12px;font-style:italic}
.chart-wrap{background:#141418;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px;overflow-x:auto}
.chart-wrap svg{display:block}
@media(max-width:768px){.kg{grid-template-columns:repeat(2,1fr)}.g2,.g3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="c">
  <div class="hd">
    <div>
      <h1>Premios Increíbles — Inteligencia de Negocios</h1>
      <p id="hd-sub">Cargando datos...</p>
      <div class="period" id="hd-period">Cargando...</div>
    </div>
    <img src="https://www.premiosincreibles.cl/wp-content/uploads/2026/01/participar_imagen.png" alt="PI" class="logo">
  </div>
  <div id="dashboard">
    <p style="text-align:center;padding:60px;color:rgba(255,255,255,0.3)">Cargando dashboard...</p>
  </div>
  <div class="foot" id="foot"></div>
</div>

<script>
/* ── helpers ── */
function fmt(n){return n.toLocaleString('es-CL')}
function fmtM(n){return '$'+(n/1000000).toFixed(1)+'M'}
function fmtK(n){return '$'+Math.round(n/1000)+'K'}
function pct(a,b){return b>0?Math.round(a/b*100):0}

function sparkline(dailyData,key,w,h,color){
  var allDays=Object.keys(dailyData).sort().slice(-14);
  if(allDays.length<2) return '';
  var vals=allDays.map(function(d){return dailyData[d][key]||0});
  var max=Math.max.apply(null,vals)||1;
  var pts=vals.map(function(v,i){
    return Math.round(i/(vals.length-1)*w)+','+Math.round(h-v/max*(h-4));
  });
  return '<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:'+h+'px;display:block"><polyline points="'+pts.join(' ')+'" fill="none" stroke="'+color+'" stroke-width="1.5" stroke-linecap="round"/></svg>';
}

var SPANS={s3:{start:'2026-02-16',end:'2026-04-13'},s4:{start:'2026-04-12',end:'2026-05-27'},s5:{start:'2026-05-24',end:'2026-07-19'}};

function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000)}

/* ── fetch ── */
fetch('data.json?v='+Date.now()).then(function(r){return r.json()}).then(render).catch(function(e){
  document.getElementById('dashboard').innerHTML='<p style="color:#EF4444;text-align:center;padding:40px">Error: '+e.message+'</p>';
});

/* ── main render ── */
function render(d){
  var s5=d.sorteos.s5, s4=d.sorteos.s4, s3=d.sorteos.s3, ret=d.retention, m=d.meta;
  var u=new Date(d.updated);
  var S5_START=new Date('2026-05-24'), S5_END=new Date('2026-07-19');
  var totalDaysS5=daysBetween('2026-05-24','2026-07-19');
  var diasTranscurridos=Math.min(Math.max(Math.round((new Date()-S5_START)/86400000),0),totalDaysS5);
  var diasRestantes=totalDaysS5-diasTranscurridos;

  /* header */
  document.getElementById('hd-sub').innerHTML='Análisis multi-sorteo · '+fmt(m.total_orders_analyzed)+' órdenes · '+fmt(m.total_buyers)+' compradores · Actualizado '+u.toLocaleString('es-CL');
  document.getElementById('hd-period').innerHTML='Sorteo 5 activo · Día '+s5.days+' de ~'+totalDaysS5+' · Faltan '+diasRestantes+' días · Cierre 19 julio 2026';
  document.getElementById('foot').textContent='Dashboard BI · Muller & Pérez · '+fmt(m.total_orders_analyzed)+' órdenes · Actualizado '+u.toLocaleString('es-CL')+' · Auto-refresh 10 min';

  var html='';

  /* ═══════════════════════════════════════════
     1. HERO KPIs (6 cards with sparklines)
     ═══════════════════════════════════════════ */
  var roas=s5.fb?s5.fb.roas+'x':'—';
  var cpa=s5.fb?fmtK(s5.fb.cpa_per_order):'—';
  var kpis=[
    {v:fmtM(s5.total_revenue), l:'Revenue S5', spark:sparkline(s5.by_day,'rev',120,28,'#FFD700')},
    {v:fmt(s5.total_orders), l:'Órdenes S5', spark:sparkline(s5.by_day,'orders',120,28,'#E53935')},
    {v:fmtK(s5.avg_ticket), l:'Ticket Promedio', spark:''},
    {v:roas, l:'ROAS S5', spark:''},
    {v:cpa, l:'CPA / Orden', spark:''},
    {v:diasRestantes+' días', l:'Días restantes', spark:''}
  ];
  html+='<div class="kg">';
  kpis.forEach(function(kpi){
    html+='<div class="k"><div class="kv">'+kpi.v+'</div><div class="kl">'+kpi.l+'</div>';
    if(kpi.spark) html+='<div class="spark">'+kpi.spark+'</div>';
    html+='</div>';
  });
  html+='</div>';

  /* ═══════════════════════════════════════════
     2. REVENUE/DAY CURVE (SVG chart)
     ═══════════════════════════════════════════ */
  html+='<div class="s"><div class="st">Revenue por día de sorteo — S3 vs S4 vs S5</div>';
  html+=buildRevenueChart(s3,s4,s5);
  html+='</div>';

  /* ═══════════════════════════════════════════
     3. CUPONES Y DESCUENTOS — Timeline completa S5
     ═══════════════════════════════════════════ */
  html+='<div class="s"><div class="st">Cupones y descuentos — Timeline completa S5</div>';
  html+=buildCouponSection(s5);
  html+='</div>';

  /* ═══════════════════════════════════════════
     4. CAMPAÑAS META
     ═══════════════════════════════════════════ */
  html+='<div class="s"><div class="st">Campañas Meta</div>';
  html+=buildCampaignsTable(s5);
  html+='</div>';

  /* ═══════════════════════════════════════════
     5. ANUNCIOS META
     ═══════════════════════════════════════════ */
  html+='<div class="s"><div class="st">Top 10 Anuncios Meta</div>';
  html+=buildAdsTable(s5);
  html+='</div>';

  /* ═══════════════════════════════════════════
     6. STICKER PACKS
     ═══════════════════════════════════════════ */
  html+='<div class="s"><div class="st">Sticker Packs — Distribución</div>';
  html+=buildPacksSection(s5,s4,s3);
  html+='</div>';

  /* ═══════════════════════════════════════════
     7. SOURCES CON REVENUE
     ═══════════════════════════════════════════ */
  html+='<div class="s"><div class="st">Fuentes de Tráfico con Revenue</div>';
  html+=buildSourcesSection(s5,s4,s3);
  html+='</div>';

  /* ═══════════════════════════════════════════
     8. RECOMPRA
     ═══════════════════════════════════════════ */
  html+='<div class="s"><div class="st">Análisis de Recompra</div>';
  html+=buildRetentionSection(s5,ret);
  html+='</div>';

  /* ═══════════════════════════════════════════
     9. TRADE-OFF DURACIÓN
     ═══════════════════════════════════════════ */
  html+='<div class="s"><div class="st">Trade-off Duración — 45 vs 30 días</div>';
  html+=buildDurationSection(s5,s4,s3,d);
  html+='</div>';

  /* ═══════════════════════════════════════════
     10. WHATSAPP + ACTIONS
     ═══════════════════════════════════════════ */
  html+='<div class="s"><div class="st">WhatsApp + Actions (Meta)</div>';
  html+=buildActionsSection(s5,s4,s3);
  html+='</div>';

  /* ═══════════════════════════════════════════
     11. VENTAS PERDIDAS (PENDING + FAILED)
     ═══════════════════════════════════════════ */
  if(d.lost_sales){
    html+='<div class="s"><div class="st" style="color:#EF4444">Ventas Perdidas — Órdenes sin pagar</div>';
    html+=buildLostSalesSection(d.lost_sales);
    html+='</div>';
  }

  document.getElementById('dashboard').innerHTML=html;
}

/* ══════════════════════════════════════════════════════════════
   SECTION BUILDERS
   ══════════════════════════════════════════════════════════════ */

/* ── 2. Revenue/Day Chart — S3 vs S4 vs S5 by sorteo day ── */
function buildRevenueChart(s3,s4,s5){
  function getDailyData(sorteo){
    var days=Object.keys(sorteo.by_day).sort();
    return days.map(function(d){return {date:d, rev:sorteo.by_day[d].rev||0, orders:sorteo.by_day[d].orders||0}});
  }
  var d3=getDailyData(s3), d4=getDailyData(s4), d5=getDailyData(s5);
  var maxDays=Math.max(d3.length,d4.length,d5.length);
  if(maxDays<2) return '<p class="fallback">Datos insuficientes para graficar</p>';

  var allRevs=d3.map(function(d){return d.rev}).concat(d4.map(function(d){return d.rev})).concat(d5.map(function(d){return d.rev}));
  var maxVal=Math.max.apply(null,allRevs)||1;

  var W=1140, H=340, padL=65, padR=110, padT=25, padB=60;
  var chartW=W-padL-padR, chartH=H-padT-padB;
  var yMax=Math.ceil(maxVal/500000)*500000;
  if(yMax<maxVal) yMax=maxVal*1.1;

  function xP(i){return padL+i/(maxDays-1)*chartW}
  function yP(v){return padT+chartH-v/yMax*chartH}

  var svg='<div class="chart-wrap"><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;min-height:280px">';

  /* y gridlines */
  for(var t=0;t<=5;t++){
    var yv=yMax/5*t;var yy=yP(yv);
    svg+='<line x1="'+padL+'" y1="'+yy+'" x2="'+(W-padR)+'" y2="'+yy+'" stroke="rgba(255,255,255,0.06)"/>';
    svg+='<text x="'+(padL-8)+'" y="'+(yy+3)+'" text-anchor="end" fill="rgba(255,255,255,0.3)" font-size="9" font-family="Montserrat">'+fmtK(yv)+'</text>';
  }

  /* series */
  var series=[
    {data:d3, color:'rgba(255,255,255,0.3)', width:1.5, name:'S3', sub:s3.name+' — '+d3.length+' días — '+fmtM(s3.total_revenue)},
    {data:d4, color:'#E53935', width:1.5, name:'S4', sub:s4.name+' — '+d4.length+' días — '+fmtM(s4.total_revenue)},
    {data:d5, color:'#FFD700', width:2.5, name:'S5', sub:s5.name+' — '+d5.length+' días — '+fmtM(s5.total_revenue)}
  ];

  series.forEach(function(s){
    if(s.data.length<2) return;
    var pts=s.data.map(function(d,i){return Math.round(xP(i))+','+Math.round(yP(d.rev))});
    svg+='<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+s.color+'" stroke-width="'+s.width+'" stroke-linecap="round" stroke-linejoin="round"/>';
    /* end label */
    var li=s.data.length-1;
    svg+='<text x="'+Math.round(xP(li)+6)+'" y="'+Math.round(yP(s.data[li].rev)+4)+'" fill="'+s.color+'" font-size="10" font-family="Montserrat" font-weight="800">'+s.name+'</text>';
  });

  /* S5 area fill */
  if(d5.length>1){
    var pts5=d5.map(function(d,i){return Math.round(xP(i))+','+Math.round(yP(d.rev))});
    svg+='<polygon points="'+Math.round(xP(0))+','+Math.round(yP(0))+' '+pts5.join(' ')+' '+Math.round(xP(d5.length-1))+','+Math.round(yP(0))+'" fill="url(#goldGrad)" opacity="0.08"/>';
    svg+='<defs><linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFD700"/><stop offset="100%" stop-color="#FFD700" stop-opacity="0"/></linearGradient></defs>';
  }

  /* day 18 marker */
  if(d5.length>=18){
    var mx=xP(17);
    svg+='<line x1="'+Math.round(mx)+'" y1="'+padT+'" x2="'+Math.round(mx)+'" y2="'+(H-padB)+'" stroke="#10B981" stroke-width="1.5" stroke-dasharray="4,3"/>';
    svg+='<text x="'+Math.round(mx)+'" y="'+(padT-4)+'" text-anchor="middle" fill="#10B981" font-size="9" font-family="Montserrat" font-weight="700">Día 18 ('+d5[17].date.substring(5)+')</text>';
  }

  /* x-axis: día del sorteo + fecha S5 debajo */
  for(var i=0;i<maxDays;i+=7){
    var xx=Math.round(xP(i));
    svg+='<text x="'+xx+'" y="'+(H-padB+14)+'" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="8" font-family="Montserrat" font-weight="600">Día '+(i+1)+'</text>';
    if(i<d5.length){
      svg+='<text x="'+xx+'" y="'+(H-padB+26)+'" text-anchor="middle" fill="rgba(255,215,0,0.3)" font-size="7" font-family="Montserrat">'+d5[i].date.substring(5)+'</text>';
    }
  }

  /* legend bar at bottom */
  var lgY=H-8;
  series.forEach(function(s,idx){
    var lx=padL+idx*320;
    svg+='<line x1="'+lx+'" y1="'+lgY+'" x2="'+(lx+20)+'" y2="'+lgY+'" stroke="'+s.color+'" stroke-width="2"/>';
    svg+='<text x="'+(lx+25)+'" y="'+(lgY+3)+'" fill="'+s.color+'" font-size="8" font-family="Montserrat">'+s.sub+'</text>';
  });

  svg+='</svg></div>';
  return svg;
}

/* ── 3. Coupon Section ── */
function buildCouponSection(s5){
  var h='';
  if(!s5.by_coupon_day){return '<p class="fallback">Datos de cupones no disponibles. Ejecuta el pipeline actualizado.</p>'}

  var allDays=Object.keys(s5.by_coupon_day).sort();
  if(allDays.length===0) return '<p class="fallback">Sin datos de cupones</p>';

  /* ── Totals for insight ── */
  var totalWith=0,totalWithout=0,revWith=0,revWithout=0,totalDiscount=0;
  allDays.forEach(function(day){
    var cd=s5.by_coupon_day[day];
    var w=cd.with_coupon||{orders:0,rev:0};
    var wo=cd.without_coupon||{orders:0,rev:0};
    totalWith+=w.orders; revWith+=w.rev;
    totalWithout+=wo.orders; revWithout+=wo.rev;
  });
  var tickWith=totalWith>0?Math.round(revWith/totalWith):0;
  var tickWithout=totalWithout>0?Math.round(revWithout/totalWithout):0;

  /* ── KPI cards ── */
  h+='<div class="kg" style="grid-template-columns:repeat(5,1fr)">';
  h+='<div class="k"><div class="kv" style="font-size:18px">'+fmt(totalWith+totalWithout)+'</div><div class="kl">Órdenes totales S5</div></div>';
  h+='<div class="k"><div class="kv" style="font-size:18px">'+pct(totalWith,totalWith+totalWithout)+'%</div><div class="kl">Con cupón</div></div>';
  h+='<div class="k"><div class="kv" style="font-size:18px">'+fmtK(tickWith)+'</div><div class="kl">Ticket con cupón</div></div>';
  h+='<div class="k"><div class="kv" style="font-size:18px">'+fmtK(tickWithout)+'</div><div class="kl">Ticket sin cupón</div></div>';
  var totalDiscountAll=0;
  if(s5.coupon_summary){Object.values(s5.coupon_summary).forEach(function(c){totalDiscountAll+=c.discount||0})}
  h+='<div class="k"><div class="kv" style="font-size:18px;color:#EF4444">'+fmtK(totalDiscountAll)+'</div><div class="kl">Total descontado</div></div>';
  h+='</div>';

  /* ── SVG: stacked bar chart, orders con/sin cupón por día ── */
  var maxOrd=0;
  allDays.forEach(function(day){
    var cd=s5.by_coupon_day[day];
    var t=(cd.with_coupon?cd.with_coupon.orders:0)+(cd.without_coupon?cd.without_coupon.orders:0);
    if(t>maxOrd) maxOrd=t;
  });

  var W=1140,H=180,padL=45,padR=10,padT=10,padB=40;
  var chartW=W-padL-padR,chartH=H-padT-padB;
  var barW=Math.max(Math.floor(chartW/allDays.length)-2,4);

  h+='<div class="cd" style="margin-top:8px;padding:12px"><h3 style="color:#FFD700;font-size:11px;margin-bottom:6px">Órdenes/día: sin cupón (dorado) + con cupón (rojo)</h3>';
  h+='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;min-height:140px">';

  /* y grid */
  for(var t=0;t<=3;t++){
    var yv=Math.round(maxOrd/3*t);
    var yy=padT+chartH-yv/maxOrd*chartH;
    h+='<line x1="'+padL+'" y1="'+Math.round(yy)+'" x2="'+(W-padR)+'" y2="'+Math.round(yy)+'" stroke="rgba(255,255,255,0.06)"/>';
    h+='<text x="'+(padL-4)+'" y="'+Math.round(yy+3)+'" text-anchor="end" fill="rgba(255,255,255,0.3)" font-size="8" font-family="Montserrat">'+yv+'</text>';
  }

  allDays.forEach(function(day,i){
    var cd=s5.by_coupon_day[day];
    var wO=(cd.with_coupon?cd.with_coupon.orders:0);
    var woO=(cd.without_coupon?cd.without_coupon.orders:0);
    var total=wO+woO;
    var xB=padL+i*(chartW/allDays.length)+1;
    var hWo=maxOrd>0?woO/maxOrd*chartH:0;
    var hW=maxOrd>0?wO/maxOrd*chartH:0;
    /* sin cupón = gold (bottom) */
    h+='<rect x="'+Math.round(xB)+'" y="'+Math.round(padT+chartH-hWo-hW)+'" width="'+barW+'" height="'+Math.round(hWo)+'" fill="#FFD700" rx="1"/>';
    /* con cupón = red (top) */
    h+='<rect x="'+Math.round(xB)+'" y="'+Math.round(padT+chartH-hW)+'" width="'+barW+'" height="'+Math.round(hW)+'" fill="#E53935" rx="1" opacity="0.8"/>';

    /* x labels every 5 days */
    if(i%5===0||i===allDays.length-1){
      h+='<text x="'+Math.round(xB+barW/2)+'" y="'+(H-padB+12)+'" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="7" font-family="Montserrat">'+day.substring(5)+'</text>';
      h+='<text x="'+Math.round(xB+barW/2)+'" y="'+(H-padB+22)+'" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="7" font-family="Montserrat">d'+(i+1)+'</text>';
    }
  });
  h+='</svg></div>';

  /* ── Coupon summary table (grouped) ── */
  if(s5.coupon_summary){
    var entries=Object.entries(s5.coupon_summary).sort(function(a,b){return b[1].orders-a[1].orders});
    if(entries.length>0){
      /* Group coupons by type */
      var groups={wa:{label:'WhatsApp (w*)',orders:0,rev:0,disc:0,codes:[]},flash:{label:'Flash / fecha',orders:0,rev:0,disc:0,codes:[]},preventa:{label:'Preventa',orders:0,rev:0,disc:0,codes:[]},other:{label:'Otros',orders:0,rev:0,disc:0,codes:[]}};
      entries.forEach(function(e){
        var code=e[0],d=e[1];
        if(code==='preventa'){groups.preventa.orders+=d.orders;groups.preventa.rev+=d.revenue;groups.preventa.disc+=d.discount;groups.preventa.codes.push(code)}
        else if(/^w\d/.test(code)){groups.wa.orders+=d.orders;groups.wa.rev+=d.revenue;groups.wa.disc+=d.discount;groups.wa.codes.push(code)}
        else if(/^(flash|junio|mayo|\djunio|m\d|super|sincensura|final|\d+junio)/.test(code)){groups.flash.orders+=d.orders;groups.flash.rev+=d.revenue;groups.flash.disc+=d.discount;groups.flash.codes.push(code)}
        else{groups.other.orders+=d.orders;groups.other.rev+=d.revenue;groups.other.disc+=d.discount;groups.other.codes.push(code)}
      });

      h+='<div class="g2" style="margin-top:8px">';
      h+='<div class="cd"><h3 style="color:#FFD700;font-size:11px;margin-bottom:6px">Cupones agrupados por tipo</h3>';
      h+='<table><thead><tr><th>Tipo</th><th class="r">Órdenes</th><th class="r">Revenue</th><th class="r">Descuento</th><th class="r">Ticket</th><th class="r">Códigos</th></tr></thead><tbody>';
      ['preventa','wa','flash','other'].forEach(function(gk){
        var g=groups[gk];
        if(g.orders===0) return;
        var tick=g.orders>0?Math.round(g.rev/g.orders):0;
        h+='<tr><td class="b">'+g.label+'</td><td class="r">'+fmt(g.orders)+'</td><td class="r">'+fmtK(g.rev)+'</td><td class="r" style="color:#EF4444">'+fmtK(g.disc)+'</td><td class="r">'+fmtK(tick)+'</td><td class="r" style="font-size:7px;color:rgba(255,255,255,0.3)">'+g.codes.length+'</td></tr>';
      });
      h+='</tbody></table></div>';

      /* Top 10 individual coupons */
      h+='<div class="cd"><h3 style="color:#FFD700;font-size:11px;margin-bottom:6px">Top 10 cupones por uso</h3>';
      h+='<table><thead><tr><th>Código</th><th class="r">Órdenes</th><th class="r">Revenue</th><th class="r">Descuento</th></tr></thead><tbody>';
      entries.slice(0,10).forEach(function(e){
        var cs=e[1];
        h+='<tr><td class="b">'+e[0]+'</td><td class="r">'+fmt(cs.orders)+'</td><td class="r">'+fmtK(cs.revenue)+'</td><td class="r" style="color:#EF4444">'+fmtK(cs.discount)+'</td></tr>';
      });
      h+='</tbody></table></div>';
      h+='</div>';
    }
  }

  /* ── Insight ── */
  var tickDiff=tickWithout>0?Math.round((tickWith-tickWithout)/tickWithout*100):0;
  if(tickDiff<-10){
    h+='<div class="alert" style="margin-top:8px"><h4>Los cupones bajan el ticket '+Math.abs(tickDiff)+'%</h4><p>Ticket con cupón: '+fmtK(tickWith)+' vs sin cupón: '+fmtK(tickWithout)+'. '+pct(totalWith,totalWith+totalWithout)+'% de las ventas usan cupón. Descuento total otorgado: <strong style="color:#fff">'+fmtK(totalDiscountAll)+'</strong>. El volumen que generan ('+fmt(totalWith)+' órdenes) compensa parcialmente, pero hay que evaluar si los cupones están canibalizando ventas que habrían ocurrido sin descuento.</p></div>';
  } else {
    h+='<div class="opp" style="margin-top:8px"><h4>Cupones generan volumen sin destruir ticket</h4><p>Ticket con cupón: '+fmtK(tickWith)+' vs sin cupón: '+fmtK(tickWithout)+' (diferencia '+tickDiff+'%). '+fmt(totalWith)+' órdenes con cupón ('+pct(totalWith,totalWith+totalWithout)+'% del total). Descuento total: '+fmtK(totalDiscountAll)+'.</p></div>';
  }

  return h;
}

/* ── 9. Duration Trade-off ── */
function buildDurationSection(s5,s4,s3,d){
  var h='';

  var totalDaysS3=daysBetween(SPANS.s3.start,SPANS.s3.end);
  var totalDaysS4=daysBetween(SPANS.s4.start,SPANS.s4.end);
  var totalDaysS5=daysBetween(SPANS.s5.start,SPANS.s5.end);

  function getRevPerDay(sorteo){return sorteo.days>0?Math.round(sorteo.total_revenue/sorteo.days):0}
  function getOrdPerDay(sorteo){return sorteo.days>0?(sorteo.total_orders/sorteo.days).toFixed(1):0}

  /* first 7 / last 7 averages */
  function avgRange(sorteo,startIdx,endIdx){
    var dayKeys=Object.keys(sorteo.by_day).sort();
    var slice=dayKeys.slice(startIdx,endIdx);
    if(slice.length===0) return 0;
    var sum=0;
    slice.forEach(function(k){sum+=sorteo.by_day[k].rev||0});
    return Math.round(sum/slice.length);
  }

  function halfRevenue(sorteo){
    var dayKeys=Object.keys(sorteo.by_day).sort();
    var mid=Math.floor(dayKeys.length/2);
    var first=0,second=0;
    dayKeys.forEach(function(k,i){
      if(i<mid) first+=sorteo.by_day[k].rev||0;
      else second+=sorteo.by_day[k].rev||0;
    });
    var total=first+second;
    return {first:pct(first,total),second:pct(second,total)};
  }

  var s3first7=avgRange(s3,0,7), s3last7=avgRange(s3,-7);
  var s4first7=avgRange(s4,0,7), s4last7=avgRange(s4,-7);
  var s5first7=avgRange(s5,0,7), s5last7=avgRange(s5,-7);
  var s5DayKeys=Object.keys(s5.by_day).sort();
  if(s5DayKeys.length>=7) s5last7=avgRange(s5,s5DayKeys.length-7,s5DayKeys.length);

  var s3half=halfRevenue(s3), s4half=halfRevenue(s4), s5half=halfRevenue(s5);
  var s3decay=s3first7>0?Math.round((s3last7-s3first7)/s3first7*100):0;
  var s4decay=s4first7>0?Math.round((s4last7-s4first7)/s4first7*100):0;
  var s5decay=s5first7>0?Math.round((s5last7-s5first7)/s5first7*100):0;

  h+='<table><thead><tr><th>Métrica</th><th class="r">S3 ('+totalDaysS3+' días)</th><th class="r">S4 ('+totalDaysS4+' días)</th><th class="r">S5 ('+totalDaysS5+' días, en curso)</th></tr></thead><tbody>';
  h+='<tr><td class="b">Revenue/día</td><td class="r">'+fmtK(getRevPerDay(s3))+'</td><td class="r">'+fmtK(getRevPerDay(s4))+'</td><td class="r">'+fmtK(getRevPerDay(s5))+'</td></tr>';
  h+='<tr><td class="b">Órdenes/día</td><td class="r">'+getOrdPerDay(s3)+'</td><td class="r">'+getOrdPerDay(s4)+'</td><td class="r">'+getOrdPerDay(s5)+'</td></tr>';
  h+='<tr><td class="b">Prom. primeros 7 días</td><td class="r">'+fmtK(s3first7)+'</td><td class="r">'+fmtK(s4first7)+'</td><td class="r">'+fmtK(s5first7)+'</td></tr>';
  h+='<tr><td class="b">Prom. últimos 7 días</td><td class="r">'+fmtK(s3last7)+'</td><td class="r">'+fmtK(s4last7)+'</td><td class="r">'+fmtK(s5last7)+'</td></tr>';
  h+='<tr><td class="b">Decay rate</td><td class="r '+(s3decay<0?'dn':'up')+'">'+s3decay+'%</td><td class="r '+(s4decay<0?'dn':'up')+'">'+s4decay+'%</td><td class="r '+(s5decay<0?'dn':'up')+'">'+s5decay+'%</td></tr>';
  h+='<tr><td class="b">% rev 1ra mitad</td><td class="r">'+s3half.first+'%</td><td class="r">'+s4half.first+'%</td><td class="r">'+s5half.first+'%</td></tr>';
  h+='<tr><td class="b">% rev 2da mitad</td><td class="r">'+s3half.second+'%</td><td class="r">'+s4half.second+'%</td><td class="r">'+s5half.second+'%</td></tr>';
  h+='</tbody></table>';

  /* Cumulative revenue curves SVG */
  h+=buildCumulativeCurves(s5,s4,s3);

  return h;
}

function buildCumulativeCurves(s5,s4,s3){
  var sorteos=[
    {label:'S3',data:s3,color:'#64748B',totalDays:daysBetween(SPANS.s3.start,SPANS.s3.end)},
    {label:'S4',data:s4,color:'#E53935',totalDays:daysBetween(SPANS.s4.start,SPANS.s4.end)},
    {label:'S5',data:s5,color:'#FFD700',totalDays:daysBetween(SPANS.s5.start,SPANS.s5.end)}
  ];

  var W=1140,H=260,padL=60,padR=20,padT=20,padB=40;
  var chartW=W-padL-padR,chartH=H-padT-padB;

  /* compute cumulative revenue normalized to 0-100% duration */
  var maxRev=0;
  var curves=sorteos.map(function(s){
    var dayKeys=Object.keys(s.data.by_day).sort();
    var totalDays=s.totalDays;
    var startDate=new Date(dayKeys[0]+'T12:00:00');
    var cumRev=0;
    var points=[];
    dayKeys.forEach(function(dk){
      cumRev+=s.data.by_day[dk].rev||0;
      var dayNum=Math.round((new Date(dk+'T12:00:00')-startDate)/86400000);
      var pctDuration=Math.min(dayNum/totalDays*100,100);
      points.push({pct:pctDuration,rev:cumRev});
    });
    if(cumRev>maxRev) maxRev=cumRev;
    return {label:s.label,color:s.color,points:points};
  });

  if(maxRev===0) return '';

  function x(pctVal){return padL+pctVal/100*chartW}
  function y(rev){return padT+chartH-rev/maxRev*chartH}

  var svg='<div class="chart-wrap" style="margin-top:16px"><svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;min-height:200px">';

  /* grid */
  for(var t=0;t<=4;t++){
    var yv=maxRev/4*t;
    var yy=y(yv);
    svg+='<line x1="'+padL+'" y1="'+yy+'" x2="'+(W-padR)+'" y2="'+yy+'" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>';
    svg+='<text x="'+(padL-8)+'" y="'+(yy+3)+'" text-anchor="end" fill="rgba(255,255,255,0.3)" font-size="9" font-family="Montserrat">'+fmtM(yv)+'</text>';
  }
  /* x-axis */
  for(var p=0;p<=100;p+=20){
    svg+='<text x="'+Math.round(x(p))+'" y="'+(H-padB+16)+'" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-size="9" font-family="Montserrat">'+p+'%</text>';
  }

  /* curves */
  curves.forEach(function(curve){
    if(curve.points.length<2) return;
    var pts=curve.points.map(function(p){return Math.round(x(p.pct))+','+Math.round(y(p.rev))});
    svg+='<polyline points="'+pts.join(' ')+'" fill="none" stroke="'+curve.color+'" stroke-width="2" stroke-linecap="round"/>';
    /* label at end */
    var last=curve.points[curve.points.length-1];
    svg+='<text x="'+(Math.round(x(last.pct))+6)+'" y="'+Math.round(y(last.rev))+'" fill="'+curve.color+'" font-size="10" font-family="Montserrat" font-weight="700">'+curve.label+'</text>';
  });

  svg+='</svg></div>';
  return svg;
}

/* ── 10. WhatsApp + Actions ── */
function buildActionsSection(s5,s4,s3){
  var h='';
  var sorteos=[{label:'S5',data:s5},{label:'S4',data:s4},{label:'S3',data:s3}];
  var hasAny=false;

  sorteos.forEach(function(sorteo){
    if(!sorteo.data.fb_tables||!sorteo.data.fb_tables.actions||sorteo.data.fb_tables.actions.length===0) return;
    hasAny=true;
    var actions=sorteo.data.fb_tables.actions;

    /* aggregate actions */
    var totals={wa_starts:0,leads:0,link_clicks:0,video_views:0};
    actions.forEach(function(a){
      totals.wa_starts+=parseInt(a.wa_starts||a['WhatsApp message starts']||a['Messaging conversations started']||0)||0;
      totals.leads+=parseInt(a.leads||a.Leads||0)||0;
      totals.link_clicks+=parseInt(a.link_clicks||a['Link clicks']||a['Link Clicks']||0)||0;
      totals.video_views+=parseInt(a.video_views||a['Video views']||a['3-second video plays']||0)||0;
    });

    h+='<h3 style="font-size:12px;font-weight:800;color:#FFD700;margin:12px 0 8px">'+sorteo.label+'</h3>';
    h+='<div class="kg" style="grid-template-columns:repeat(4,1fr)">';
    h+='<div class="k"><div class="kv" style="font-size:18px">'+fmt(totals.wa_starts)+'</div><div class="kl">WA Starts</div></div>';
    h+='<div class="k"><div class="kv" style="font-size:18px">'+fmt(totals.leads)+'</div><div class="kl">Leads</div></div>';
    h+='<div class="k"><div class="kv" style="font-size:18px">'+fmt(totals.link_clicks)+'</div><div class="kl">Link Clicks</div></div>';
    h+='<div class="k"><div class="kv" style="font-size:18px">'+fmt(totals.video_views)+'</div><div class="kl">Video Views</div></div>';
    h+='</div>';
  });

  if(!hasAny){
    h+='<p class="fallback">Datos de actions no disponibles. Se mostrarán cuando se carguen desde Reportei.</p>';
  }

  return h;
}

/* ── 11. Ventas Perdidas ── */
function buildLostSalesSection(lostSales){
  if(!lostSales||lostSales.total_count===0) return '<p class="fallback">Sin datos de ventas perdidas.</p>';
  var h='';
  var p=lostSales.pending, f=lostSales.failed;

  h+='<div class="kg" style="grid-template-columns:repeat(4,1fr)">';
  h+='<div class="k"><div class="kv" style="color:#EF4444;font-size:22px">'+fmt(lostSales.total_count)+'</div><div class="kl">Órdenes no pagadas</div></div>';
  h+='<div class="k"><div class="kv" style="color:#EF4444;font-size:22px">'+fmtM(lostSales.total_revenue)+'</div><div class="kl">Revenue estimado perdido</div></div>';
  h+='<div class="k"><div class="kv" style="color:#F59E0B;font-size:22px">'+fmt(p.count)+'</div><div class="kl">Pending (abandonaron)</div></div>';
  h+='<div class="k"><div class="kv" style="color:#F59E0B;font-size:22px">'+fmt(f.count)+'</div><div class="kl">Failed (pago rechazado)</div></div>';
  h+='</div>';

  // Payment method breakdown
  var allPm={};
  [p,f].forEach(function(s){
    if(!s.by_payment) return;
    Object.keys(s.by_payment).forEach(function(k){ allPm[k]=(allPm[k]||0)+s.by_payment[k]; });
  });
  var pmEntries=Object.entries(allPm).sort(function(a,b){return b[1]-a[1];});
  var pmTotal=pmEntries.reduce(function(s,e){return s+e[1];},0)||1;

  h+='<div class="g2" style="margin-top:10px">';
  h+='<div class="cd">';
  h+='<h3 style="color:#FFD700;font-size:12px;margin-bottom:8px">Método de pago (órdenes perdidas)</h3>';
  h+='<table><thead><tr><th>Método</th><th class="r">Órdenes</th><th class="r">%</th></tr></thead><tbody>';
  pmEntries.forEach(function(e){
    h+='<tr><td>'+e[0]+'</td><td class="r">'+fmt(e[1])+'</td><td class="r">'+pct(e[1],pmTotal)+'%</td></tr>';
  });
  h+='</tbody></table></div>';

  h+='<div class="cd">';
  h+='<h3 style="color:#FFD700;font-size:12px;margin-bottom:8px">Desglose</h3>';
  h+='<table><thead><tr><th>Estado</th><th class="r">Órdenes</th><th class="r">Revenue est.</th><th class="r">Ticket prom.</th></tr></thead><tbody>';
  h+='<tr><td class="b">Pending</td><td class="r">'+fmt(p.count)+'</td><td class="r">'+fmtM(p.revenue)+'</td><td class="r">'+fmtK(p.avg_ticket||0)+'</td></tr>';
  h+='<tr><td class="b">Failed</td><td class="r">'+fmt(f.count)+'</td><td class="r">'+fmtM(f.revenue)+'</td><td class="r">'+fmtK(f.avg_ticket||0)+'</td></tr>';
  h+='<tr style="background:rgba(239,68,68,0.1)"><td class="b" style="color:#EF4444">Total</td><td class="r b" style="color:#EF4444">'+fmt(lostSales.total_count)+'</td><td class="r b" style="color:#EF4444">'+fmtM(lostSales.total_revenue)+'</td><td class="r">&mdash;</td></tr>';
  h+='</tbody></table>';

  // Context vs completed
  h+='<div class="alert" style="margin-top:8px"><h4>Contexto</h4><p>Estas '+fmt(lostSales.total_count)+' órdenes no pagadas representan <strong style="color:#fff">'+fmtM(lostSales.total_revenue)+'</strong> en revenue potencial. Recuperar el 10% con un email de recordatorio con botón de pago significaría <strong style="color:#fff">'+fmtM(Math.round(lostSales.total_revenue*0.1))+'</strong> adicionales.</p></div>';
  h+='</div></div>';

  return h;
}

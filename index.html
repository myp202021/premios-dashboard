<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard BI — Premios Increíbles</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:#0A0A0F;color:#fff;line-height:1.5;font-size:13px}
.c{max-width:1200px;margin:0 auto;padding:0 24px}
.hd{padding:20px 0;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.hd h1{font-size:22px;font-weight:900}.hd .logo{height:44px;border-radius:50%}
.hd p{font-size:11px;color:rgba(255,255,255,0.4)}
.period{display:inline-block;padding:3px 10px;border-radius:5px;background:rgba(229,57,53,0.15);border:1px solid rgba(229,57,53,0.3);font-size:10px;font-weight:700;color:#E53935;margin-top:4px}
.kg{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin:16px 0}
.k{background:#141418;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:14px;text-align:center;position:relative;overflow:hidden}
.k::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#E53935,#FFD700)}
.kv{font-size:20px;font-weight:900;margin-bottom:2px;color:#FFD700}
.kl{font-size:8px;color:rgba(255,255,255,0.4);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.s{padding:20px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
.st{font-size:14px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.st::before{content:'';width:3px;height:14px;background:linear-gradient(135deg,#E53935,#FFD700);border-radius:2px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.cd{background:#141418;border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:16px}
.cd h3{font-size:12px;font-weight:800;margin-bottom:8px;color:#FFD700}
table{width:100%;border-collapse:separate;border-spacing:0;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.06);font-size:11px;margin-bottom:10px}
thead th{background:#1C1C24;color:rgba(255,255,255,0.5);padding:8px 10px;text-align:left;font-weight:700;font-size:9px;text-transform:uppercase}
thead th.r{text-align:right}
tbody td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,0.03);color:rgba(255,255,255,0.7)}
tbody td.r{text-align:right;font-variant-numeric:tabular-nums}
tbody td.b{font-weight:700;color:#fff}
tbody tr:hover td{background:rgba(229,57,53,0.04)}
.insight{background:rgba(255,215,0,0.05);border:1px solid rgba(255,215,0,0.12);border-radius:10px;padding:12px;margin-top:10px}
.insight h4{font-size:11px;font-weight:800;color:#FFD700;margin-bottom:4px}
.insight p{font-size:10px;color:rgba(255,255,255,0.45);line-height:1.7}
.alert{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:12px;margin-top:10px}
.alert h4{font-size:11px;font-weight:800;color:#EF4444;margin-bottom:4px}
.alert p{font-size:10px;color:rgba(255,255,255,0.45);line-height:1.7}
.opp{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);border-radius:10px;padding:12px;margin-top:10px}
.opp h4{font-size:11px;font-weight:800;color:#10B981;margin-bottom:4px}
.opp p{font-size:10px;color:rgba(255,255,255,0.45);line-height:1.7}
.up{color:#10B981}.dn{color:#EF4444}.nt{color:#F59E0B}.gd{color:#FFD700}
.foot{padding:14px 0;text-align:center;font-size:9px;color:rgba(255,255,255,0.15)}
.bar{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.bar-fill{height:20px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:9px;font-weight:700;min-width:24px}
.bar-label{font-size:10px;color:rgba(255,255,255,0.4);min-width:80px}
.daily-card{background:linear-gradient(135deg,rgba(229,57,53,0.1),rgba(255,215,0,0.05));border:1px solid rgba(255,215,0,0.15);border-radius:12px;padding:16px;text-align:center}
.daily-card .dv{font-size:28px;font-weight:900;color:#FFD700}
.daily-card .dl{font-size:9px;color:rgba(255,255,255,0.4);margin-top:2px}
@media(max-width:768px){.kg{grid-template-columns:repeat(2,1fr)}.g2,.g3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="c">
  <div class="hd">
    <div>
      <h1>Premios Increíbles — Inteligencia de Negocios</h1>
      <p id="hd-sub">Cargando datos...</p>
      <div class="period" id="hd-period">Cargando...</div>
    </div>
    <img src="https://www.premiosincreibles.cl/wp-content/uploads/2026/01/participar_imagen.png" alt="PI" class="logo">
  </div>
  <div id="dashboard">
    <p style="text-align:center;padding:60px;color:rgba(255,255,255,0.3)">Cargando dashboard...</p>
  </div>
  <div class="foot" id="foot"></div>
</div>

<script>
function fmt(n){return n.toLocaleString('es-CL')}
function fmtM(n){return '$'+(n/1000000).toFixed(1)+'M'}
function fmtK(n){return '$'+Math.round(n/1000)+'K'}
function pct(a,b){return b>0?Math.round(a/b*100):0}

fetch('data.json?v='+Date.now()).then(r=>r.json()).then(render).catch(e=>{
  document.getElementById('dashboard').innerHTML='<p style="color:#EF4444;text-align:center;padding:40px">Error: '+e.message+'</p>'
})

function render(d){
  var s5=d.sorteos.s5, s4=d.sorteos.s4, s3=d.sorteos.s3, ret=d.retention, m=d.meta
  var u=new Date(d.updated)
  var totalDaysS5=55 // estimado cierre 19 julio
  var pctAvance=Math.round(s5.days/totalDaysS5*100)

  // Header
  document.getElementById('hd-sub').innerHTML='Análisis multi-sorteo · '+fmt(m.total_orders_analyzed)+' órdenes · '+fmt(m.total_buyers)+' compradores · Actualizado '+u.toLocaleString('es-CL')
  document.getElementById('hd-period').innerHTML='Sorteo 5 activo · Día '+s5.days+' de ~'+totalDaysS5+' · '+pctAvance+'% de avance · Cierre 19 julio 2026'

  // Footer
  document.getElementById('foot').textContent='Dashboard BI · Muller & Pérez · '+fmt(m.total_orders_analyzed)+' órdenes · Actualizado '+u.toLocaleString('es-CL')+' · Auto-refresh 10 min'

  // Indicador diario
  var days=Object.keys(s5.by_day).sort()
  var today=days[days.length-1]
  var todayData=s5.by_day[today]
  var yesterday=days.length>1?days[days.length-2]:today
  var yesterdayData=s5.by_day[yesterday]
  var avgDaily=Math.round(s5.total_orders/s5.days)
  var invDaily=s5.fb?Math.round(s5.fb.inv_per_day):0

  // Comparativa por % avance
  function ordersAtPct(sorteo,targetPct){
    var dayKeys=Object.keys(sorteo.by_day).sort()
    var targetDay=Math.round(dayKeys.length*(targetPct/100))
    var count=0
    for(var i=0;i<Math.min(targetDay,dayKeys.length);i++){count+=sorteo.by_day[dayKeys[i]].orders}
    return count
  }

  var pctSteps=[10,20,33,50,66,80,100]
  var compRows=''
  pctSteps.forEach(function(p){
    var o3=ordersAtPct(s3,p), o4=ordersAtPct(s4,p), o5=ordersAtPct(s5,p)
    var p3=pct(o3,s3.total_orders), p4=pct(o4,s4.total_orders)
    var isCurrentS5=p<=pctAvance+5 && p>=pctAvance-5
    var rowStyle=isCurrentS5?' style="background:rgba(255,215,0,0.06);"':''
    var s5Cell=p<=pctAvance?'<td class="r gd">'+fmt(o5)+'</td>':'<td class="r" style="color:rgba(255,255,255,0.2)">—</td>'
    var s5PctCell=p<=pctAvance?'<td class="r gd">'+pct(o5,s5.total_orders)+'%*</td>':'<td class="r" style="color:rgba(255,255,255,0.2)">—</td>'
    var label=p+'%'
    if(isCurrentS5)label=p+'% ◄ S5'
    compRows+='<tr'+rowStyle+'><td class="b'+(isCurrentS5?' gd':'')+'">'+label+'</td><td class="r">'+fmt(o3)+'</td><td class="r" style="color:rgba(255,255,255,0.3)">'+p3+'%</td><td class="r">'+fmt(o4)+'</td><td class="r" style="color:rgba(255,255,255,0.3)">'+p4+'%</td>'+s5Cell+s5PctCell+'</tr>'
  })

  // Sources bars
  var srcTotal=Object.values(s5.sources).reduce(function(a,b){return a+b},0)
  var srcBars=''
  var srcColors={'(direct)':'#FFD700','Instagram':'#E1306C','Facebook':'#1877F2','Google':'#34A853','Otros':'#64748B'}
  Object.entries(s5.sources).sort(function(a,b){return b[1]-a[1]}).forEach(function(e){
    var w=Math.round(e[1]/srcTotal*100)
    srcBars+='<div class="bar"><span class="bar-label">'+e[0]+'</span><div class="bar-fill" style="width:'+w+'%;background:'+(srcColors[e[0]]||'#666')+'">'+fmt(e[1])+'</div><span style="font-size:9px;color:rgba(255,255,255,0.3)">'+w+'%</span></div>'
  })

  // Daily table (last 7 days)
  var last7=days.slice(-7)
  var dailyRows=''
  last7.forEach(function(day){
    var dd=s5.by_day[day]
    var dayName=new Date(day+'T12:00:00').toLocaleDateString('es-CL',{weekday:'short',day:'numeric',month:'short'})
    dailyRows+='<tr><td class="b">'+dayName+'</td><td class="r">'+fmt(dd.orders)+'</td><td class="r">'+fmtK(dd.rev)+'</td><td class="r">'+fmt(dd.stickers)+'</td></tr>'
  })

  // Build dashboard
  var html=''

  // KPIs
  html+='<div class="kg">'
  html+='<div class="k"><div class="kv">'+fmtM(s5.total_revenue)+'</div><div class="kl">Revenue S5</div></div>'
  html+='<div class="k"><div class="kv">'+fmt(s5.total_orders)+'</div><div class="kl">Órdenes S5</div></div>'
  html+='<div class="k"><div class="kv">'+fmtK(invDaily)+'</div><div class="kl">Inv. diaria actual</div></div>'
  html+='<div class="k"><div class="kv">'+(s5.fb?s5.fb.roas+'x':'—')+'</div><div class="kl">ROAS S5</div></div>'
  html+='<div class="k"><div class="kv">'+fmt(ret.dormant)+'</div><div class="kl">Compradores dormidos</div></div>'
  html+='<div class="k"><div class="kv">'+pctAvance+'%</div><div class="kl">Avance sorteo</div></div>'
  html+='</div>'

  // Indicador diario
  html+='<div class="s"><div class="st">Indicador diario</div>'
  html+='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px">'
  html+='<div class="daily-card"><div class="dv">'+fmt(yesterdayData.orders)+'</div><div class="dl">Órdenes ayer ('+yesterday.substring(5)+')</div></div>'
  html+='<div class="daily-card"><div class="dv">'+fmtK(yesterdayData.rev)+'</div><div class="dl">Revenue ayer</div></div>'
  html+='<div class="daily-card"><div class="dv">'+fmt(avgDaily)+'</div><div class="dl">Promedio diario</div></div>'
  html+='<div class="daily-card"><div class="dv">'+fmtK(invDaily)+'</div><div class="dl">Inv. diaria Meta</div></div>'
  html+='<div class="daily-card"><div class="dv">'+(s5.fb?'$'+fmt(s5.fb.cpa_per_order):'—')+'</div><div class="dl">CPA por orden</div></div>'
  html+='</div>'

  // Last 7 days table
  html+='<table style="margin-top:12px"><thead><tr><th>Día</th><th class="r">Órdenes</th><th class="r">Revenue</th><th class="r">Stickers</th></tr></thead><tbody>'+dailyRows+'</tbody></table>'
  html+='</div>'

  // Comparativa por % avance
  html+='<div class="s"><div class="st">Comparativa por % de avance del sorteo</div>'
  html+='<p style="font-size:10px;color:rgba(255,255,255,0.4);margin:-8px 0 12px;">Compara cada sorteo al mismo punto proporcional de su duración. S5 está al '+pctAvance+'% de avance (día '+s5.days+' de ~'+totalDaysS5+').</p>'
  html+='<table><thead><tr><th>% avance</th><th class="r">S3 ('+s3.days+' días)</th><th class="r">% vendido</th><th class="r">S4 ('+s4.days+' días)</th><th class="r">% vendido</th><th class="r">S5 (~'+totalDaysS5+' días)</th><th class="r">% vendido</th></tr></thead><tbody>'+compRows+'</tbody></table>'

  // Insight comparativa
  var s3AtPct=ordersAtPct(s3,pctAvance), s4AtPct=ordersAtPct(s4,pctAvance), s5AtPct=s5.total_orders
  html+='<div class="insight"><h4>Al '+pctAvance+'% de avance: S5 tiene '+fmt(s5AtPct)+' órdenes vs '+fmt(s3AtPct)+' de S3 y '+fmt(s4AtPct)+' de S4</h4>'
  html+='<p>S5 invierte '+fmtK(invDaily)+'/día vs '+fmtK(Math.round(s4.fb.spend/s4.days))+'/día de S4. '
  if(s5AtPct>s3AtPct)html+='<strong class="up">S5 va mejor que S3 al mismo punto.</strong> '
  if(s5AtPct<s4AtPct)html+='S4 iba más fuerte, pero con '+(s4.fb.spend/s5.fb.spend).toFixed(1)+'x más inversión. '
  html+='El 60-80% de las ventas se concentra en la segunda mitad del sorteo.</p></div>'
  html+='</div>'

  // Fuentes de tráfico
  html+='<div class="s"><div class="st">Fuentes de tráfico S5</div><div class="g2"><div>'+srcBars+'</div>'
  html+='<div class="cd"><h3>Distribución</h3>'
  Object.entries(s5.sources).sort(function(a,b){return b[1]-a[1]}).forEach(function(e){
    html+='<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,0.03)"><span>'+e[0]+'</span><span style="font-weight:700">'+fmt(e[1])+' ('+Math.round(e[1]/srcTotal*100)+'%)</span></div>'
  })
  html+='</div></div></div>'

  // Nuevos vs Recurrentes
  html+='<div class="s"><div class="st">Nuevos vs Recurrentes — S5</div><div class="g3">'
  html+='<div class="cd"><h3>Compradores nuevos</h3><div style="font-size:24px;font-weight:900;color:#3B82F6">'+fmt(ret.s5_new_buyers)+'</div><div style="font-size:10px;color:rgba(255,255,255,0.4)">Revenue: '+fmtM(ret.s5_new_rev)+' · Ticket: $'+fmt(ret.s5_new_ticket)+'</div></div>'
  html+='<div class="cd"><h3>Recurrentes (ya compraron antes)</h3><div style="font-size:24px;font-weight:900;color:#10B981">'+fmt(s5.unique_buyers-ret.s5_new_buyers)+'</div><div style="font-size:10px;color:rgba(255,255,255,0.4)">Revenue: '+fmtM(ret.s5_ret_rev)+' · Ticket: $'+fmt(ret.s5_ret_ticket)+'</div></div>'
  html+='<div class="cd"><h3>Retención cross-sorteo</h3><div style="font-size:11px;color:rgba(255,255,255,0.5);line-height:2">S3→S4: '+ret.s3_to_s4.pct+'% ('+fmt(ret.s3_to_s4.count)+')<br>S4→S5: '+ret.s4_to_s5.pct+'% ('+fmt(ret.s4_to_s5.count)+')<br>Los 3 sorteos: '+fmt(ret.all_three)+'</div></div>'
  html+='</div>'

  // Oportunidad dormidos
  html+='<div class="opp"><h4>Oportunidad: '+fmt(ret.dormant)+' compradores dormidos</h4><p>Compraron en S3 o S4 pero no en S5. Ya confían, ya pagaron. Una campaña de email/WhatsApp con oferta exclusiva puede activar una fracción significativa sin tocar el presupuesto de ads.</p></div>'
  html+='</div>'

  // Eficiencia publicitaria
  html+='<div class="s"><div class="st">Eficiencia publicitaria</div>'
  html+='<table><thead><tr><th>Métrica</th><th class="r">S3</th><th class="r">S4</th><th class="r">S5 (actual)</th></tr></thead><tbody>'
  html+='<tr><td class="b">Órdenes</td><td class="r">'+fmt(s3.total_orders)+'</td><td class="r">'+fmt(s4.total_orders)+'</td><td class="r gd">'+fmt(s5.total_orders)+'</td></tr>'
  html+='<tr><td class="b">Revenue</td><td class="r">'+fmtM(s3.total_revenue)+'</td><td class="r">'+fmtM(s4.total_revenue)+'</td><td class="r gd">'+fmtM(s5.total_revenue)+'</td></tr>'
  html+='<tr><td class="b">Inversión Meta</td><td class="r">'+fmtM(s3.fb.spend)+'</td><td class="r">'+fmtM(s4.fb.spend)+'</td><td class="r">'+fmtM(s5.fb.spend)+'</td></tr>'
  html+='<tr><td class="b">ROAS</td><td class="r">'+s3.fb.roas+'x</td><td class="r">'+s4.fb.roas+'x</td><td class="r gd">'+s5.fb.roas+'x</td></tr>'
  html+='<tr><td class="b">CPA por orden</td><td class="r">$'+fmt(s3.fb.cpa_per_order)+'</td><td class="r">$'+fmt(s4.fb.cpa_per_order)+'</td><td class="r">$'+fmt(s5.fb.cpa_per_order)+'</td></tr>'
  html+='<tr><td class="b">Inv. diaria</td><td class="r">'+fmtK(Math.round(s3.fb.spend/s3.days))+'</td><td class="r">'+fmtK(Math.round(s4.fb.spend/s4.days))+'</td><td class="r gd">'+fmtK(invDaily)+'</td></tr>'
  html+='<tr><td class="b">Compradores únicos</td><td class="r">'+fmt(s3.unique_buyers)+'</td><td class="r">'+fmt(s4.unique_buyers)+'</td><td class="r">'+fmt(s5.unique_buyers)+'</td></tr>'
  html+='<tr><td class="b">Ticket promedio</td><td class="r">$'+fmt(s3.avg_ticket)+'</td><td class="r">$'+fmt(s4.avg_ticket)+'</td><td class="r">$'+fmt(s5.avg_ticket)+'</td></tr>'
  html+='<tr><td class="b">% Recurrentes</td><td class="r">'+s3.repeat_pct+'%</td><td class="r">'+s4.repeat_pct+'%</td><td class="r">'+s5.repeat_pct+'%</td></tr>'
  html+='<tr><td class="b">Días activos</td><td class="r">'+s3.days+'</td><td class="r">'+s4.days+'</td><td class="r gd">'+s5.days+' (en curso)</td></tr>'
  html+='</tbody></table>'

  // Insight inversión
  html+='<div class="alert"><h4>Nota sobre datos de inversión</h4><p>Los datos de inversión Meta provienen de Reportei (conectado a Meta Ads). Si hay diferencias con el panel de Meta directo, pueden deberse a delays de sincronización o atribución diferente. Para máxima precisión, comparar con el Business Manager de Meta.</p></div>'
  html+='</div>'

  // Perfil comprador
  html+='<div class="s"><div class="st">Perfil del comprador S5</div><div class="g2">'
  html+='<div class="cd"><h3>Métodos de pago</h3>'
  Object.entries(s5.payments).sort(function(a,b){return b[1]-a[1]}).forEach(function(e){
    html+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,0.03)"><span>'+e[0]+'</span><span style="font-weight:700">'+fmt(e[1])+'</span></div>'
  })
  html+='</div>'
  html+='<div class="cd"><h3>Variantes más vendidas</h3>'
  Object.entries(s5.variants).sort(function(a,b){return b[1]-a[1]}).slice(0,8).forEach(function(e){
    html+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,0.03)"><span>'+e[0].substring(0,40)+'</span><span style="font-weight:700">'+fmt(e[1])+'</span></div>'
  })
  html+='</div></div></div>'

  // Cohortes de recompra
  if (d.cohortes) {
    var ch = d.cohortes
    html+='<div class="s"><div class="st">Cohortes de recompra — ¿Quién vuelve a comprar?</div>'
    html+='<p style="font-size:10px;color:rgba(255,255,255,0.4);margin:-8px 0 12px;">Llave: email. Cohorte definida por la primera compra del cliente. Recompra = compra posterior con código de concurso (flash o WhatsApp).</p>'

    html+='<table><thead><tr><th>Cohorte</th><th class="r">Compradores</th><th class="r">Recompra gral.</th><th class="r">Con flash</th><th class="r">Con WA</th><th class="r">Días a 2da compra</th><th class="r">Ticket 1ra</th><th class="r">Ticket recompra</th></tr></thead><tbody>'

    var cohortOrder = ['A', 'B', 'AB', 'C']
    var cohortColors = { A: '#F59E0B', B: '#10B981', AB: '#8B5CF6', C: 'rgba(255,255,255,0.5)' }
    cohortOrder.forEach(function(key) {
      var c = ch[key]
      if (!c) return
      var color = cohortColors[key] || '#fff'
      html+='<tr>'
      html+='<td class="b" style="color:'+color+'">'+key+') '+c.name+'</td>'
      html+='<td class="r">'+fmt(c.total_buyers)+'</td>'
      html+='<td class="r" style="color:'+color+';font-weight:700">'+c.return_rate_any+'% ('+c.returners_any+')</td>'
      html+='<td class="r">'+c.return_rate_flash+'% ('+c.returners_flash+')</td>'
      html+='<td class="r">'+c.return_rate_wa+'% ('+c.returners_wa+')</td>'
      html+='<td class="r">'+(c.avg_days_to_return || '—')+' días</td>'
      html+='<td class="r">$'+fmt(c.avg_first_ticket)+'</td>'
      html+='<td class="r">'+(c.avg_return_ticket ? '$'+fmt(c.avg_return_ticket) : '—')+'</td>'
      html+='</tr>'
    })
    html+='</tbody></table>'

    // Insights
    var cA = ch.A, cC = ch.C, cAB = ch.AB
    if (cA && cC) {
      if (cA.return_rate_any < cC.return_rate_any / 2) {
        html+='<div class="alert"><h4>Alerta: el comprador de $2.500 casi no vuelve ('+cA.return_rate_any+'% vs '+cC.return_rate_any+'% línea base)</h4>'
        html+='<p>De '+cA.total_buyers+' compradores que entraron por precio bajo, solo '+cA.returners_any+' volvieron a comprar. '
        html+='La línea base (≥$5.000 sin cupón) tiene '+cC.return_rate_any+'% de recompra. '
        html+='<strong>Dato para la decisión: el $2.500 atrae volumen pero no genera motor de recompra.</strong> '
        html+='Si el objetivo es recompra, el canal WhatsApp (cupones de concurso) funciona mejor como palanca.</p></div>'
      } else {
        html+='<div class="opp"><h4>El comprador de $2.500 sí vuelve ('+cA.return_rate_any+'%)</h4>'
        html+='<p>La tasa de retorno es comparable a la línea base ('+cC.return_rate_any+'%). El precio bajo funciona como puerta de entrada.</p></div>'
      }
    }

    // Cohorte "other" (concursos flash) — si tiene alta recompra
    if (ch.other && ch.other.return_rate_any > 30) {
      html+='<div class="opp"><h4>Los compradores que llegan por concurso flash tienen '+ch.other.return_rate_any+'% de recompra</h4>'
      html+='<p>'+fmt(ch.other.total_buyers)+' personas entraron con cupón de concurso. De ellas, '+ch.other.returners_any+' volvieron a comprar ('+ch.other.return_rate_any+'%). '
      html+='Revenue por recompra: $'+fmt(Math.round(ch.other.return_rev/1000))+'K. '
      html+='<strong>Los concursos flash son el motor de retención más fuerte.</strong></p></div>'
    }

    html+='</div>'
  }

  // ============================================================
  // TABLERO DE EMBUDOS (Arquitectura PDF)
  // ============================================================
  var srcTotal = Object.values(s5.sources).reduce(function(a,b){return a+b},0)
  var directPct = Math.round(s5.sources['(direct)'] / srcTotal * 100)
  var metaPct = Math.round((s5.sources['Instagram'] + s5.sources['Facebook']) / srcTotal * 100)
  var googlePct = Math.round((s5.sources['Google'] || 0) / srcTotal * 100)
  var revPropio = Math.round(s5.sources['(direct)'] / srcTotal * s5.total_revenue)
  var revMeta = Math.round(((s5.sources['Instagram']||0) + (s5.sources['Facebook']||0)) / srcTotal * s5.total_revenue)

  html+='<div class="s"><div class="st">Tablero de embudos — Arquitectura de conversión</div>'
  html+='<p style="font-size:10px;color:rgba(255,255,255,0.4);margin:-8px 0 12px;">Métricas clave del modelo flywheel. Meta: mover el ratio propio/Meta de '+directPct+'/'+metaPct+' a 45/55 y luego 60/40.</p>'

  // KPI embudo: % revenue propio vs meta
  html+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">'
  html+='<div class="k"><div class="kv" style="color:'+(directPct>=45?'#10B981':'#F59E0B')+'">'+directPct+'%</div><div class="kl">Revenue canal propio</div></div>'
  html+='<div class="k"><div class="kv" style="color:'+(metaPct<=55?'#10B981':'#EF4444')+'">'+metaPct+'%</div><div class="kl">Revenue Meta Ads</div></div>'
  html+='<div class="k"><div class="kv" style="color:'+(s5.fb.roas>=4?'#10B981':s5.fb.roas>=2?'#F59E0B':'#EF4444')+'">'+s5.fb.roas+'x</div><div class="kl">ROAS (meta 4x)</div></div>'
  html+='<div class="k"><div class="kv" style="color:'+(ret.s4_to_s5.pct>=50?'#10B981':'#F59E0B')+'">'+ret.s4_to_s5.pct+'%</div><div class="kl">Retención S4→S5 (meta 55%)</div></div>'
  html+='</div>'

  // Tabla métricas por embudo
  html+='<table><thead><tr><th>Embudo</th><th>KPI principal</th><th class="r">Actual</th><th class="r">Meta N°5</th><th class="r">Estado</th></tr></thead><tbody>'

  var embudoMetrics = [
    ['0 Instrumentación', '% Purchase deduplicados', '—', '98%+', '⚠️ Pendiente auditar'],
    ['1 Adquisición', 'CPA por compra', '$'+fmt(s5.fb.cpa_per_order), 'Bajar', s5.fb.cpa_per_order < 5000 ? '✅' : '⚠️'],
    ['1 Web', 'Conversión web', '~'+Math.round(s5.total_orders / (s5.fb.impressions || s5.fb.reach || 1) * 100)+'%', '4-6%', '⚠️'],
    ['2 Nurture', '% revenue audiencia propia', directPct+'%', '45%', directPct >= 45 ? '✅ Cumple' : '⚠️ Falta '+(45-directPct)+'pts'],
    ['3 Carrito', '% carritos recuperados', '~0%', '15-25%', '❌ Sin secuencia'],
    ['4 Live', 'Pico 20:00 vs resto', fmt(s5.by_hour['20']||0)+' vs '+fmt(Math.round(s5.total_orders/24))+' prom', 'Maximizar', (s5.by_hour['20']||0) > s5.total_orders/24*2 ? '✅ 7x prom' : '⚠️'],
    ['5 Retención', 'Recompra sorteo a sorteo', ret.s4_to_s5.pct+'%', '55-60%', ret.s4_to_s5.pct >= 50 ? '✅' : '⚠️ Falta '+(55-ret.s4_to_s5.pct)+'pts'],
    ['Global', 'ROAS', s5.fb.roas+'x', '4x+', s5.fb.roas >= 4 ? '✅' : s5.fb.roas >= 2 ? '⚠️' : '❌'],
    ['Global', '% revenue propio vs Meta', directPct+'/'+metaPct, '45/55', directPct >= 45 ? '✅' : '⚠️']
  ]
  embudoMetrics.forEach(function(row) {
    var statusColor = row[4].startsWith('✅') ? '#10B981' : row[4].startsWith('❌') ? '#EF4444' : '#F59E0B'
    html+='<tr><td class="b">'+row[0]+'</td><td>'+row[1]+'</td><td class="r">'+row[2]+'</td><td class="r" style="color:rgba(255,255,255,0.3)">'+row[3]+'</td><td class="r" style="color:'+statusColor+'">'+row[4]+'</td></tr>'
  })
  html+='</tbody></table>'

  // Ventas por hora — gráfico de barras con marcadores de eventos
  html+='<div class="st" style="margin-top:16px">Ventas por hora — Impacto del Live y Zoom</div>'
  html+='<p style="font-size:10px;color:rgba(255,255,255,0.4);margin:-8px 0 12px;">El pico de las 19-20h confirma que el live es publicidad y el Zoom es conversión. Early Bird a las 18:00 suaviza la curva.</p>'
  var maxHour = Math.max.apply(null, Object.values(s5.by_hour))
  html+='<div style="display:flex;align-items:end;gap:2px;height:120px;margin:12px 0">'
  for (var h = 0; h < 24; h++) {
    var val = s5.by_hour[String(h)] || 0
    var pctH = Math.round(val / maxHour * 100)
    var color = 'rgba(255,215,0,0.4)'
    var label = ''
    if (h === 18) { color = '#F59E0B'; label = 'Early Bird' }
    if (h === 19 || h === 20) { color = '#E53935'; label = h===20?'LIVE':'Pico' }
    if (h === 21 || h === 22) { color = '#10B981'; label = h===22?'Zoom':'' }
    html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">'
    if (val > maxHour * 0.3) html+='<div style="font-size:7px;color:rgba(255,255,255,0.4)">'+val+'</div>'
    html+='<div style="width:100%;height:'+pctH+'%;background:'+color+';border-radius:2px 2px 0 0;min-height:2px"></div>'
    html+='<div style="font-size:7px;color:rgba(255,255,255,'+(label?'0.8':'0.25')+')">'+h+'</div>'
    if (label) html+='<div style="font-size:6px;color:'+color+';font-weight:700">'+label+'</div>'
    html+='</div>'
  }
  html+='</div>'

  // Insight Early Bird
  var pre18 = 0, post18 = 0, live = (s5.by_hour['19']||0) + (s5.by_hour['20']||0)
  for (var hh = 0; hh < 18; hh++) pre18 += s5.by_hour[String(hh)] || 0
  for (var hh = 18; hh < 24; hh++) post18 += s5.by_hour[String(hh)] || 0
  html+='<div class="g2">'
  html+='<div class="insight"><h4>El 18:00-23:59 concentra el '+Math.round(post18/s5.total_orders*100)+'% de las ventas</h4>'
  html+='<p>'+fmt(post18)+' de '+fmt(s5.total_orders)+' órdenes se hacen después de las 18:00. El live de las 20:00 genera '+fmt(live)+' órdenes ('+Math.round(live/s5.total_orders*100)+'% del total). <strong>El PDF propone Early Bird a las 18:00 con precio que sube a las 20:00 para aplanar el pico y capturar abandono.</strong></p></div>'
  html+='<div class="alert"><h4>Acciones pendientes de implementar</h4>'
  html+='<p><strong>1. Recuperación carrito (Embudo 3):</strong> Secuencia ManyChat 15min/1h/19:30/día siguiente. Ataca el 40-49% de abandono. Mayor ROI de todos.<br>'
  html+='<strong>2. Deduplicación Purchase/InitiateCheckout:</strong> Auditar Pixel + GA4 en CartFlows. Sin esto se optimiza a ciegas.<br>'
  html+='<strong>3. Early Bird 18:00:</strong> Precio que sube a las 20:00. Aplana pico, adelanta caja, da deadline al carrito.<br>'
  html+='<strong>4. Ruta A → ChannelJoin:</strong> Ads fríos que lleven al Canal WhatsApp, no a la web. Baja dependencia de Meta.<br>'
  html+='<strong>5. UGC del Zoom:</strong> Capturar reacción de ganadores. Creative fresco = CPA más bajo.</p></div>'
  html+='</div>'

  // Revenue propio vs Meta — evolución
  html+='<div class="st" style="margin-top:16px">Composición de revenue: canal propio vs Meta</div>'
  html+='<div style="display:flex;height:32px;border-radius:8px;overflow:hidden;margin:8px 0">'
  html+='<div style="width:'+directPct+'%;background:#FFD700;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#0A0A0F">Propio '+directPct+'%</div>'
  html+='<div style="width:'+metaPct+'%;background:#E53935;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff">Meta '+metaPct+'%</div>'
  html+='<div style="width:'+googlePct+'%;background:#34A853;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff">Google '+googlePct+'%</div>'
  html+='</div>'
  html+='<div class="g3">'
  html+='<div class="cd"><h3>Canal propio (directo)</h3><div style="font-size:20px;font-weight:900;color:#FFD700">'+fmtM(revPropio)+'</div><div style="font-size:10px;color:rgba(255,255,255,0.4)">'+fmt(s5.sources['(direct)'])+' órdenes · Costo: $0</div></div>'
  html+='<div class="cd"><h3>Meta Ads (IG + FB)</h3><div style="font-size:20px;font-weight:900;color:#E53935">'+fmtM(revMeta)+'</div><div style="font-size:10px;color:rgba(255,255,255,0.4)">'+fmt((s5.sources['Instagram']||0)+(s5.sources['Facebook']||0))+' órdenes · Inversión: '+fmtM(s5.fb.spend)+'</div></div>'
  html+='<div class="cd"><h3>Clave del flywheel</h3><div style="font-size:10px;color:rgba(255,255,255,0.5);line-height:1.8">Cada peso que hoy le pagas a Meta por un cliente que YA te compró, muévelo a WhatsApp. El Canal tiene '+fmt(6000)+' suscriptores — es margen puro. Meta N°5: llegar a 45/55.</div></div>'
  html+='</div>'
  html+='</div>'

  document.getElementById('dashboard').innerHTML=html
}

// Auto-refresh cada 10 minutos
setInterval(function(){
  fetch('data.json?v='+Date.now()).then(function(r){return r.json()}).then(render).catch(function(){})
},10*60*1000)
</script>

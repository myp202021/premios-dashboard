name: Actualizar Dashboard Premios Increíbles

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Descargar y procesar data
        env:
          REPORTEI_TOKEN: ${{ secrets.REPORTEI_TOKEN }}
        run: node scripts/update-data.js

      - name: Commit y push
        run: |
          git config user.name "M&P Bot"
          git config user.email "contacto@mulleryperez.cl"
          git pull --rebase origin main || true
          git add data.json cache-*.json 2>/dev/null || true
          if git diff --cached --quiet 2>/dev/null; then
            echo "No changes"
          else
            git commit -m "📊 Data update $(date -u +%Y-%m-%dT%H:%M)"
            git push || git pull --rebase origin main && git push
          fi

name: Actualizar Dashboard Premios Increíbles

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Descargar y procesar data
        env:
          REPORTEI_TOKEN: ${{ secrets.REPORTEI_TOKEN }}
        run: |
          node scripts/update-data.js
          node scripts/cohortes.js
          node -e "var fs=require('fs');var d=JSON.parse(fs.readFileSync('data.json'));var c=JSON.parse(fs.readFileSync('cohortes.json'));d.cohortes=c.cohortes;d.cohortes_updated=c.updated;fs.writeFileSync('data.json',JSON.stringify(d));console.log('Merged cohortes')"

      - name: Commit y push
        run: |
          git config user.name "M&P Bot"
          git config user.email "contacto@mulleryperez.cl"
          git add data.json cohortes.json cache-*.json 2>/dev/null || true
          if git diff --cached --quiet 2>/dev/null; then
            echo "No changes"
          else
            git commit -m "📊 Data update $(date -u +%Y-%m-%dT%H:%M)"
            git push
          fi
